name: Deploy Develop Environment

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-and-deploy-develop:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build for develop
      run: npm run build:develop
      env:
        NODE_ENV: development
        
    - name: Setup Pages (Develop)
      uses: actions/configure-pages@v4
      
    - name: Upload artifact (Develop)
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'
        name: develop-artifact
        
    - name: Deploy to GitHub Pages (Develop)
      id: deployment
      uses: actions/deploy-pages@v4
      if: github.ref == 'refs/heads/develop'
      with:
        artifact-name: develop-artifact

# GitHub Pagesのデプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行の制御（develop環境用）
concurrency:
  group: "pages-develop"
  cancel-in-progress: true
